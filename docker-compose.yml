version: '3'
services:
  vpn:
    image: dwilson2547/nordvpn-proxy:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    dns:
      - 103.86.96.100
      - 103.86.99.100
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ovpn-data:/app/ovpn/config
    environment:
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - LOCAL_NETWORK=192.168.0.0/24
    networks:
      - default
    ports:
      - 8118:8118
    restart: always

volumes:
  ovpn-data:
